name: auto-release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version to')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Read and bump version
        id: version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          init_file = pathlib.Path("pdf_vector_importer/__init__.py")
          pyproject = pathlib.Path("pyproject.toml")
          readme = pathlib.Path("README.md")

          init_text = init_file.read_text(encoding="utf-8")
          match = re.search(r'("version":\s*\()(\d+),\s*(\d+),\s*(\d+)(\))', init_text)
          if not match:
              raise SystemExit('Could not parse version tuple from pdf_vector_importer/__init__.py')

          major, minor, patch = map(int, match.groups()[1:4])
          old_version = f"{major}.{minor}.{patch}"
          new_version = f"{major}.{minor}.{patch + 1}"

          init_text = re.sub(
              r'("version":\s*\()(\d+),\s*(\d+),\s*(\d+)(\))',
              rf'\g<1>{major}, {minor}, {patch + 1}\5',
              init_text,
              count=1,
          )
          init_file.write_text(init_text, encoding="utf-8")

          pyproject_text = pyproject.read_text(encoding="utf-8")
          pyproject_text = re.sub(
              r'(^version\s*=\s*")(\d+\.\d+\.\d+)(")',
              rf'\g<1>{new_version}\3',
              pyproject_text,
              count=1,
              flags=re.MULTILINE,
          )
          pyproject.write_text(pyproject_text, encoding="utf-8")

          readme_text = readme.read_text(encoding="utf-8")
          readme_text = re.sub(
              r"(Version-)(\d+\.\d+\.\d+)(-(green|blue)\.svg)",
              rf"\g<1>{new_version}\3",
              readme_text,
              count=1,
          )
          readme.write_text(readme_text, encoding="utf-8")

          out = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          out.write_text(
              f"old_version={old_version}\nversion={new_version}\n",
              encoding="utf-8",
          )
          PY

      - name: Build release
        run: python build_release.py

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="v${{ steps.version.outputs.version }}"
          TITLE="PDF Vector Importer for Blender v${{ steps.version.outputs.version }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.zip --clobber
          else
            gh release create "$TAG" --title "$TITLE" --generate-notes --latest dist/*.zip
          fi

      - name: Check website dispatch token secret
        id: website_dispatch_token
        env:
          WEBSITE_DISPATCH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN || secrets.BLUECOLLAR_WEBSITE_DISPATCH_TOKEN || secrets.REPO_DISPATCH_TOKEN }}
        run: |
          if [ -n "$WEBSITE_DISPATCH_TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch website release update
        if: steps.website_dispatch_token.outputs.has_token == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.WEBSITE_DISPATCH_TOKEN || secrets.BLUECOLLAR_WEBSITE_DISPATCH_TOKEN || secrets.REPO_DISPATCH_TOKEN }}
          script: |
            const tag = 'v${{ steps.version.outputs.version }}';
            const payload = {
              source_repo: context.repo.owner + '/' + context.repo.repo,
              source_event: 'auto-release',
              source_ref: context.ref,
              source_sha: context.sha,
              release_tag: tag,
              release_name: tag,
              release_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${tag}`,
            };

            await github.request('POST /repos/{owner}/{repo}/dispatches', {
              owner: 'BlueCollar-Systems',
              repo: 'BlueCollar-Website',
              event_type: 'product-release',
              client_payload: payload,
            });

            core.info('Dispatched product-release to BlueCollar-Website');

      - name: Warn when website dispatch token is missing
        if: steps.website_dispatch_token.outputs.has_token != 'true'
        run: |
          echo "::warning::Skipping website dispatch because no valid dispatch token secret is configured."
          echo "Set WEBSITE_DISPATCH_TOKEN (or BLUECOLLAR_WEBSITE_DISPATCH_TOKEN / REPO_DISPATCH_TOKEN) to enable cross-repo dispatch."
      - name: Create version bump pull request
        id: create_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to ${{ steps.version.outputs.version }}"
          branch: "automation/version-bump-v${{ steps.version.outputs.version }}"
          delete-branch: true
          title: "chore: bump version to ${{ steps.version.outputs.version }}"
          body: |
            Automated version bump generated by `auto-release`.

            Updated files:
            - `pdf_vector_importer/__init__.py`
            - `pyproject.toml`
            - `README.md`
          add-paths: |
            pdf_vector_importer/__init__.py
            pyproject.toml
            README.md

      - name: Enable auto-merge on version bump PR
        if: steps.create_pr.outcome == 'success' && steps.create_pr.outputs.pull-request-number
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.create_pr.outputs.pull-request-number }} \
            --auto --merge \
            --admin

      - name: Warn when PR auto-creation is blocked
        if: steps.create_pr.outcome == 'failure'
        run: |
          echo "::warning::Version bump branch was pushed, but this repo currently blocks GitHub Actions from creating pull requests."
          echo "::warning::Enable 'Allow GitHub Actions to create and approve pull requests' or create the PR manually from branch automation/version-bump-v${{ steps.version.outputs.version }}."

